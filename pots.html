        .product-grid {

}

        .product-card {

        }

            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            background: #2e7d32;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .back {
            display: inline-block;
            margin-bottom: 30px;
            text-decoration: none;
            color: #d00830;
            font-weight: 600;
        }
            .add-btn {
    background-color: #2e7d32; /* Dark green */
    color: #fff;               /* White text */
    padding: 10px 20px;        /* Bigger clickable area */
    border: none;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-block;     /* Makes it a proper box */
    width: 100%;               /* Fill the card width */
    text-align: center;        /* Center the text */
}

/* Hover effect */
.add-btn:hover {
    background-color: #1b5e20; /* Darker green on hover */
    transform: translateY(-2px);
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}
