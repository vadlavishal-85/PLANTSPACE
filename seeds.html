        .product-card {

        .btn {

            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .back {

        }
            .add-btn {

    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-block;     /* Makes it a proper box */
    width: 100%;               /* Fill the card width */
    text-align: center;        /* Center the text */
}

/* Hover effect */
