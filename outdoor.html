    <style>
        * {
            margin: 0;

            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;

     body {
    background: url("outdoor.png") no-repeat center center fixed;

}

        h1 {

        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-card h3 {
            margin: 15px 0 10px;
        }

        .price {
            color: #1b5e20;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            background: #2e7d32;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .back {
            display: inline-block;
            margin-bottom: 30px;
            text-decoration: none;
            color: #2e7d32;
            font-weight: 600;
        }
    .add-btn {
    background-color: #2e7d32; /* Dark green */
    color: #fff;               /* White text */
    padding: 10px 20px;        /* Bigger clickable area */
    border: none;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-block;     /* Makes it a proper box */
    width: 100%;               /* Fill the card width */
    text-align: center;        /* Center the text */
}

/* Hover effect */
.add-btn:hover {
    background-color: #1b5e20; /* Darker green on hover */
    transform: translateY(-2px);
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}
